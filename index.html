<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Kana ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(-45deg,
#120024,
#4a0072,
#7b2cbf,
#ff66c4);

background-size:400% 400%;
animation:bgMove 12s ease infinite;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:
radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;
opacity:.3;
z-index:-1;
}

#welcome{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

#welcome h1{
font-size:3rem;
color:#ffd6f5;
margin-bottom:15px;
}

#welcome p{
font-size:1.2rem;
color:#ddd;
margin-bottom:30px;
}

#surpriseBtn{
padding:18px 55px;
font-size:24px;
border:none;
border-radius:50px;
cursor:pointer;
background:linear-gradient(45deg,#ff66c4,#c084fc);
color:white;
box-shadow:0 0 25px rgba(255,255,255,.6);
}

#birthdayPage{
display:none;
padding:20px;
}

#birthdayPage h1{
font-size:3.5rem;
font-weight:bold;
background:linear-gradient(90deg,#ffd700,#ff66c4,#ffffff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
margin:20px;
text-shadow:0 0 25px rgba(255,255,255,.5);
}
.main-photo{
width:300px;
height:300px;
object-fit:cover;
border-radius:50%;
border:6px solid white;
box-shadow:
0 0 20px #fff,
0 0 40px #ff66c4,
0 0 70px #c084fc;
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}

.message{
max-width:700px;
margin:30px auto;
padding:35px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
-webkit-backdrop-filter:blur(15px);
border:1px solid rgba(255,255,255,.2);
border-radius:25px;
box-shadow:0 15px 35px rgba(0,0,0,.35);
line-height:2;
font-size:20px;
}
.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:10px;
margin-top:20px;
}

.gallery img{
transition:.4s;
cursor:pointer;
}

.gallery img:hover{
transform:scale(1.08) rotate(2deg);
box-shadow:0 0 25px white;
}
.cake{
font-size:70px;
margin:20px 0;
animation:bounce 1.5s infinite;
}

@keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}
</style>
</head>

<body>

<div class="stars"></div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<!-- Welcome Screen -->
<div id="welcome">

<h1>🎂 A Little Birthday Surprise 🎂</h1>

<p>Something special is waiting for you ❤️</p>

<button id="surpriseBtn" onclick="startCountdown()">
🎁 Press Me
</button>

</div>

<!-- Birthday Screen -->
<div id="birthdayPage">

<h1>🎉 Happy Birthday Kana ❤️ 🎉</h1>

<div class="cake">🎂</div>

<img src="photo1.jpg" class="main-photo">

<div class="message">

<h2>💌 For Kana</h2>

<p id="typing"></p>
</div>
  
<div class="gallery">
<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
<img src="photo5.jpg">
<img src="photo6.jpg">

</div>

  <div id="countdown" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
color:white;
font-size:80px;
font-weight:bold;
justify-content:center;
align-items:center;
z-index:9999;">
3
</div>

<script>
  const text = `Happy Birthday Kana ❤️

May your day be filled with happiness, laughter, success and beautiful memories.

May all your dreams come true and may this year bring you endless joy.

Thank you for being such a wonderful person.

Keep smiling and shining always ✨

With Love ❤️
Kevin`;

let i = 0;

function typeWriter() {
    if (i < text.length) {
        document.getElementById("typing").innerHTML += text.charAt(i);
        i++;
        setTimeout(typeWriter, 40);
    }
}

  function startCountdown(){

const countdown = document.getElementById("countdown");

countdown.style.display = "flex";

let numbers = ["3","2","1","🎉 Surprise!"];
let i = 0;

countdown.innerHTML = numbers[i];

let timer = setInterval(()=>{

i++;

if(i < numbers.length){
countdown.innerHTML = numbers[i];
}else{
clearInterval(timer);
countdown.style.display = "none";
showBirthday();
}

},1000);

}

function showBirthday(){

const music = document.getElementById("music");

music.play()
.then(() => {
    console.log("Music started");
})
.catch(err => {
    console.log("Music blocked", err);
});

document.getElementById("welcome").style.display = "none";
document.getElementById("birthdayPage").style.display = "block";

// Start typing animation
document.getElementById("typing").innerHTML = "";
i = 0;
typeWriter();

// First confetti burst
confetti({
    particleCount:250,
    spread:120,
    origin:{y:0.6}
});

// Continuous confetti
setInterval(()=>{
    confetti({
        particleCount:100,
        spread:100,
        origin:{y:0.6}
    });
},4000);

}

</script>

</body>
</html>
