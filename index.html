<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Kana ❤️</title>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:linear-gradient(-45deg,#120024,#4a0072,#7b2cbf,#ff66c4);background-size:400% 400%;animation:bgMove 12s ease infinite;color:#fff;text-align:center;overflow-x:hidden;min-height:100vh}
@keyframes bgMove{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
.stars{position:fixed;inset:0;background-image:radial-gradient(white 1px,transparent 1px);background-size:40px 40px;opacity:.3;z-index:-1}
#welcome{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center}
#surpriseBtn{padding:18px 55px;font-size:24px;border:none;border-radius:50px;background:#ff66c4;color:#fff}
#birthdayPage{display:none;padding:20px}
.glow-text{font-size:2.4rem;background:linear-gradient(90deg,#ffd700,#ff66c4,#fff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:textGlow 2s infinite alternate}
@keyframes textGlow{from{filter:drop-shadow(0 0 8px gold)}to{filter:drop-shadow(0 0 24px hotpink)}}
.main-photo{width:min(80vw,300px);height:min(80vw,300px);object-fit:cover;border-radius:50%;border:6px solid #fff}
.gallery{display:flex;flex-wrap:wrap;justify-content:center;gap:12px;margin-top:20px}
.gallery img{width:45%;max-width:180px;aspect-ratio:2/3;object-fit:cover;border-radius:15px;border:3px solid #fff}
.message{max-width:700px;margin:20px auto;padding:20px;background:rgba(255,255,255,.15);border-radius:20px}
#countdown{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);justify-content:center;align-items:center;font-size:120px;font-weight:bold;z-index:9999}
</style>
</head>
<body>
<div class="stars"></div>
<audio id="music" loop><source src="music.mp3" type="audio/mpeg"></audio>
<div id="welcome">
<h1>❤️ Something Special Is Waiting For You ❤️</h1>
<button id="surpriseBtn" onclick="startCountdown()">🎁 Press Me</button>
</div>
<div id="birthdayPage">
<h1 class="glow-text">🎉 Happy Birthday Kana ❤️ 🎉</h1>
<div style="font-size:60px">🎂</div>
<img src="photo1.jpg" class="main-photo">
<div class="message"><h2>💌 For Kana</h2><p id="typing"></p></div>
<div class="gallery">
<img src="photo1.jpg"><img src="photo2.jpg"><img src="photo3.jpg">
<img src="photo4.jpg"><img src="photo5.jpg"><img src="photo6.jpg">
<img src="photo7.jpg"><img src="photo8.jpg"><img src="photo9.jpg">
</div>
</div>
<div id="countdown">3</div>
<script>
const text=`Happy Birthday Kana ❤️

May your day be filled with happiness, laughter, success and beautiful memories.

May all your dreams come true and may this year bring you endless joy.

Thank you for being such a wonderful person.

Keep smiling and shining always ✨

With Love ❤️
Kevin`;
let i=0;
function typeWriter(){if(i<text.length){typing.innerHTML+=text.charAt(i);i++;setTimeout(typeWriter,40);}}
function startCountdown(){
const c=document.getElementById("countdown");
c.style.display="flex";
const n=["3","2","1","🎉 Surprise!"];let x=0;c.textContent=n[0];
const t=setInterval(()=>{x++;if(x<n.length){c.textContent=n[x]}else{clearInterval(t);c.style.display="none";showBirthday()}},1000);
}
function showBirthday(){
music.play().catch(()=>{});
welcome.style.display="none";
birthdayPage.style.display="block";
typing.innerHTML="";i=0;typeWriter();
confetti({particleCount:250,spread:120,origin:{y:.6}});
setInterval(()=>confetti({particleCount:100,spread:100,origin:{x:Math.random(),y:.6}}),4000);
}
</script>
</body>
</html>
