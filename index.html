<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday Kana ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(-45deg,#120024,#4a0072,#7b2cbf,#ff66c4);
background-size:400% 400%;
animation:bgMove 12s ease infinite;
color:white;
text-align:center;
overflow-x:hidden;
min-height:100vh;
}

@keyframes bgMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

  @keyframes glow{
0%{
text-shadow:
0 0 10px #ffd700,
0 0 20px #ff66c4,
0 0 30px #ffffff;
}
100%{
text-shadow:
0 0 20px #ffd700,
0 0 40px #ff66c4,
0 0 60px #ffffff;
}
}

.stars{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:radial-gradient(white 1px,transparent 1px);
background-size:40px 40px;
opacity:.3;
z-index:-1;
}

#welcome{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
}

#welcome h1{
font-size:2.6rem;
color:#ffd6f5;
margin-bottom:25px;
}

#surpriseBtn{
padding:18px 55px;
font-size:24px;
border:none;
border-radius:50px;
cursor:pointer;
background:linear-gradient(45deg,#ff66c4,#c084fc);
color:white;
box-shadow:0 0 25px rgba(255,255,255,.6);
transition:.3s;
}

#surpriseBtn:hover{
transform:scale(1.08);
}

#birthdayPage{
display:none;
padding:20px;
}

#birthdayPage h1{
font-size:2.8rem;
margin:20px;
background:linear-gradient(90deg,#ffd700,#ff66c4,#fff);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.main-photo{
width:min(80vw,300px);
height:min(80vw,300px);
object-fit:cover;
border-radius:50%;
border:6px solid white;
box-shadow:
0 0 20px #fff,
0 0 40px #ff66c4,
0 0 70px #c084fc;
animation:float 4s ease-in-out infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
}

.cake{
width:180px;
height:90px;
margin:30px auto;
background:linear-gradient(#ffb347,#ff7b7b);
border-radius:10px 10px 20px 20px;
position:relative;
box-shadow:0 0 20px rgba(255,180,100,.5);
}

.cake::before{
content:"";
position:absolute;
top:-12px;
left:0;
width:100%;
height:12px;
background:#fff;
border-radius:10px;
}

.candle{
position:absolute;
top:-55px;
left:50%;
transform:translateX(-50%);
width:12px;
height:55px;
background:#ffffff;
border-radius:6px;
}

.flame{
position:absolute;
top:-22px;
left:50%;
transform:translateX(-50%);
width:18px;
height:28px;
background:gold;
border-radius:50% 50% 50% 50%/60% 60% 40% 40%;
box-shadow:
0 0 15px yellow,
0 0 30px orange,
0 0 50px red;
animation:flicker .15s infinite alternate;
}

@keyframes flicker{
0%{
transform:translateX(-50%) scale(1) rotate(-3deg);
opacity:1;
}
100%{
transform:translateX(-50%) scale(1.15) rotate(3deg);
opacity:.85;
}
}

/* @keyframes bounce{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-15px);}
} */

.message{
max-width:700px;
margin:30px auto;
padding:35px;
background:rgba(255,255,255,.12);
backdrop-filter:blur(15px);
border-radius:25px;
border:1px solid rgba(255,255,255,.2);
box-shadow:0 15px 35px rgba(0,0,0,.35);
line-height:2;
font-size:20px;
}

.gallery{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:12px;
margin-top:20px;
}

.gallery img{
width:45%;
max-width:180px;
aspect-ratio:2/3;
object-fit:cover;
border-radius:15px;
border:3px solid white;
transition:.4s;
cursor:pointer;
}

.gallery img:hover{
transform:scale(1.08);
box-shadow:0 0 25px white;
}

@media(max-width:600px){

#birthdayPage h1{
font-size:2rem;
}

.message{
font-size:17px;
padding:20px;
}

.gallery img{
width:46%;
}

}

</style>
</head>

<body>

<div class="stars"></div>

<audio id="music" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

<div id="welcome">

<h1>❤️ Something Special Is Waiting For You ❤️</h1>

<button id="surpriseBtn" onclick="startCountdown()">
🎁 Press Me
</button>

</div>

<div id="birthdayPage">

<h1>🎉 Happy Birthday Kana ❤️ 🎉</h1>

<div class="cake">🎂</div>

<img src="photo1.jpg" class="main-photo">

<div class="message">

<h2>💌 For Kana</h2>

<p id="typing"></p>

</div>

<div class="gallery">

<img src="photo1.jpg">
<img src="photo2.jpg">
<img src="photo3.jpg">
<img src="photo4.jpg">
<img src="photo5.jpg">
<img src="photo6.jpg">
<img src="photo7.jpg">
<img src="photo8.jpg">
<img src="photo9.jpg">

  </div>

</div>

<!-- Countdown Overlay -->
<div id="countdown" style="
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.9);
color:white;
font-size:90px;
font-weight:bold;
  text-align:center;
/* justify-content:center; */
/* align-items:center; */
z-index:9999;">
<!-- /* text-shadow:0 0 25px #fff; -->
3
</div>

<script>

const text = `Happy Birthday Kana ❤️

May your day be filled with happiness, laughter, success and beautiful memories.

May all your dreams come true and may this year bring you endless joy.

Thank you for being such a wonderful person.

Keep smiling and shining always ✨

With Love ❤️
Kevin`;

let i = 0;

function typeWriter(){

if(i < text.length){

document.getElementById("typing").innerHTML += text.charAt(i);

i++;

setTimeout(typeWriter,40);

}

}

function startCountdown(){

const countdown = document.getElementById("countdown");

countdown.style.display = "flex";
countdown.style.justifyContent = "center";
countdown.style.alignItems = "center";

let numbers = ["3","2","1","🎉 Surprise!"];
let index = 0;

countdown.innerHTML = numbers[index];

let timer = setInterval(() => {

    index++;

    if(index < numbers.length){
        countdown.innerHTML = numbers[index];
    }else{
        clearInterval(timer);
        countdown.style.display = "none";
        showBirthday();
    }

},1000);

}

function showBirthday(){

const music = document.getElementById("music");

music.play().catch(()=>{});

document.getElementById("welcome").style.display="none";

document.getElementById("birthdayPage").style.display="block";

document.getElementById("typing").innerHTML="";

i=0;

typeWriter();

confetti({

particleCount:250,

spread:120,

origin:{y:0.6}

});

setInterval(()=>{

confetti({

particleCount:100,

spread:100,

origin:{x:Math.random(),y:0.6}

});

},4000);

}

</script>

</body>
</html>
